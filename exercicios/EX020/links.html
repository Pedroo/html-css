<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: blue;
            text-decoration: none; /* tira o sublinhado do link */
            font-weight: bold;
        }

        a:visited {
            color: red;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }

        a::after {
            content: ' [link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgrey;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://www.youtube.com/watch?v=nP-h7vCqZjU">jijiji</a></link></li>
        <li><a href="https://www.youtube.com/watch?v=nP-h7vCqZjU">guhjou87kooo</a></link></li>
        <li><a href="https://www.youtube.com/watch?v=nP-h7vCqZjU">pkopkopk</a></link></li>
    </ul>
</body>
</html>
