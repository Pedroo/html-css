<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* conf. global das CSS */
            height: 100%;
        }
        body { /* to left= esquerda, to right= direita, to top= pra cima, to bottom= para baixo */
            background-image: linear-gradient(-45deg, #4D5BD6, #6247C8, #BC2F8C, #F77528, #FEDA76); 
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>

</body>
</html>
